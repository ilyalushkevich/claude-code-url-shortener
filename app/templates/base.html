<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}URL Shortener{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#6366f1', dark: '#4f46e5' }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">
  <header class="bg-white border-b border-gray-200 shadow-sm">
    <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="/" class="text-xl font-bold text-brand tracking-tight">&#x1F517; Shortly</a>
      <nav class="text-sm text-gray-500 space-x-4">
        <a href="/" class="hover:text-brand">Home</a>
        <a href="/docs" class="hover:text-brand">API Docs</a>
      </nav>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

  <footer class="text-center text-xs text-gray-400 py-6">
    Built with FastAPI &amp; TailwindCSS
  </footer>
</body>
</html>
