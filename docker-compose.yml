services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: url_shortener
      POSTGRES_PASSWORD: password
      POSTGRES_DB: url_shortener
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8000:8000"

volumes:
  postgres_data:
